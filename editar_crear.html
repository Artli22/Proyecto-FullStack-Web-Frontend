<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear/Editar Serie</title>
    <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body>
    <div>
        <h1 id="formTitle">Crear Nueva Serie</h1>
        
        <form id="seriesForm">
            <div>
                <label for="name">Nombre:</label>
                <input type="text" id="name" required>
            </div>

            <div>
                <label for="description">Descripción:</label>
                <textarea id="description" rows="3"></textarea>
            </div>

            <div>
                <label for="imageUrl">URL de Imagen:</label>
                <input type="url" id="imageUrl">
            </div>

            <div>
                <label for="totalEpisodes">Total de Episodios:</label>
                <input type="number" id="totalEpisodes" min="1" required>
            </div>

            <div>
                <label for="currentEpisode">Episodio Actual:</label>
                <input type="number" id="currentEpisode" min="1" value="1">
            </div>

            <div>
                <button type="submit" id="submitButton">Crear Serie</button>
                <button type="button" id="cancelButton">Cancelar</button>
            </div>
        </form>
    </div>

    <script src="editar_crear.js"></script>
</body>
</html>
